<!DOCTYPE html>
<html>
<head>
    <title>NewsCaster AI</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
</head>

<body>
    <nav class="navbar">
        <span>🎙️ Newscaster</span>
        <div class="navbar-user">
        {% if user %}
            <span>{{ user.email }}</span>
            <a href="/auth/logout" class="btn-logout">Logout</a>
        {% else %}
            <a href="/login" class="btn-logout">Login</a>
        {% endif %}
        </div>
    </nav>
    <div class="container">

        <h1>NewsCaster AI</h1>
        <p>Your daily automatically generated AI news podcast.</p>

        {% if user %}
        <button id="generateBtn" onclick="generateEpisode()">🎙️ Generate New Episode</button>
        {% else %}
        <a href="/login" class="btn-login-prompt">🔒 Login to Generate Episodes</a>
        {% endif %}
        <p id="status"></p>

        <h2>Episodes</h2>
        <div id="episodes"></div>

    </div>

    <script src="/static/app.js"></script>
</body>
</html>
