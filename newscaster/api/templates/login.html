<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Newscaster</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico?v=20260318g">
  <link rel="shortcut icon" href="/static/favicon.ico?v=20260318g">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="public-page">
  <div class="auth-container">

    <!-- Back arrow -->
    <a href="/" class="auth-back-btn" title="Back to home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/>
        <path d="M12 19l-7-7 7-7"/>
      </svg>
    </a>

    <!-- Logo -->
    <img src="/static/logo.png?v=20260318d" alt="Newscaster" class="auth-logo" />

    <!-- Welcome text -->
    <h1 class="auth-welcome">Welcome back</h1>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/login">
      <input type="email" name="email" placeholder="Email" required oninvalid="this.setCustomValidity('Please enter your email address')" oninput="this.setCustomValidity('')"/>
      <div class="password-wrapper">
        <input type="password" name="password" id="login-password" placeholder="Password" required oninvalid="this.setCustomValidity('Please enter your password')" oninput="this.setCustomValidity('')"/>
        <span class="eye-btn" onclick="togglePassword('login-password', this)">
          <!-- Eye open icon -->
          <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </span>
      </div>

      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <div class="divider">or</div>

    <a href="/auth/google" class="btn-google">
      <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" />
      Continue with Google
    </a>

    <p class="auth-footer">
      Don't have an account? <a href="/signup">Sign up</a>
    </p>
  </div>

  <script>
    function togglePassword(fieldId, btn) {
      const field = document.getElementById(fieldId);
      const isHidden = field.type === "password";
      field.type = isHidden ? "text" : "password";

      // Swap between eye-open and eye-off SVG
      btn.innerHTML = isHidden
        ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
             <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
             <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
             <line x1="1" y1="1" x2="23" y2="23"/>
           </svg>`
        : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
             <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
             <circle cx="12" cy="12" r="3"/>
           </svg>`;
    }
  </script>
</body>
</html>
