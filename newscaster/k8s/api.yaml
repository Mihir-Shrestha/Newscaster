apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: newscaster-api:latest
        imagePullPolicy: Never
        env:
        - name: NEWS_API_KEY
          valueFrom:
            secretKeyRef:
              name: newscaster-api-secrets
              key: NEWS_API_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: newscaster-api-secrets
              key: OPENAI_API_KEY
        - name: BUCKET_NAME
          valueFrom:
            secretKeyRef:
              name: gcs-bucket
              key: BUCKET_NAME
        ports:
        - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
  - port: 8000
    targetPort: 8000
