apiVersion: batch/v1
kind: CronJob
metadata:
  name: fetcher-cron
spec:
  schedule: "0 6 * * *"
  timeZone: "America/Denver"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: fetcher
            image: us-central1-docker.pkg.dev/newscaster-487321/newscaster-repo/newscaster-fetcher:gke-20260408-1
            imagePullPolicy: IfNotPresent
            env:
            - name: FETCHER_MODE
              value: "cron"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: NEWS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newscaster-api-secrets
                  key: NEWS_API_KEY
            - name: RABBITMQ_HOST
              value: "rabbitmq"
