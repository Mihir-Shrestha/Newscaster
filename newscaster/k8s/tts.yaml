apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tts
  template:
    metadata:
      labels:
        app: tts
    spec:
      containers:
      - name: tts
        image: us-central1-docker.pkg.dev/newscaster-487321/newscaster-repo/newscaster-tts:gke-20260408-2
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: "250m"
            memory: "384Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/var/secrets/google/gcp-key.json"
        - name: GCS_BUCKET
          valueFrom:
            secretKeyRef:
              name: gcs-bucket
              key: BUCKET_NAME
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-app
              key: DATABASE_URL
        volumeMounts:
        - name: gcp-secret
          mountPath: /var/secrets/google
        - name: output
          mountPath: /output
        readinessProbe:
          tcpSocket:
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        ports:
        - containerPort: 9090
      volumes:
      - name: gcp-secret
        secret:
          secretName: gcp-sa-key
      - name: output
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: tts
spec:
  selector:
    app: tts
  ports:
  - port: 9090
    targetPort: 9090