services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:6.2
    container_name: redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  fetcher:
    build: ./fetcher
    env_file: .env
    depends_on:
      - rabbitmq

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        echo "Waiting for Ollama..."
        until ollama list > /dev/null 2>&1; do sleep 2; done
        ollama list | grep -q "llama3.2:3b" || ollama pull llama3.2:3b
        wait

  summarizer:
    build: ./summarizer
    env_file: .env
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
    depends_on:
      - rabbitmq
      - ollama

  tts:
    build:
      context: .
      dockerfile: tts/Dockerfile
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEWS_API_KEY=${NEWS_API_KEY}
    volumes:
      - ./output:/output
      - ./secrets:/var/secrets/google
    depends_on:
      - rabbitmq
      - postgres

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./api/templates:/app/templates
      - ./api/static:/app/static
      - ./output:/output
    environment:
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_QUEUE=to_fetcher
      - DATABASE_URL=${DATABASE_URL}
      - NEWS_API_KEY=${NEWS_API_KEY}
    depends_on:
      - redis
      - rabbitmq
      - postgres

volumes:
  ollama_data:
  postgres_data: